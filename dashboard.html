<script>
    const dashboardTranslationState = {
      dashboardData: null,
      quickHistoryItems: []
    };

    const originalRenderDashboardPage = window.renderDashboardPage;

    function tkText(key, fallback) {
      if (window.TKI18n && typeof window.TKI18n.t === 'function') {
        return window.TKI18n.t(key);
      }
      return fallback || key;
    }

    function getHistoryStatusLabel(status) {
      const normalized = String(status || '').toLowerCase();
      const key = { pending:'finance.status.pending', approved:'finance.status.approved', rejected:'finance.status.rejected', completed:'finance.status.completed', paid:'finance.status.paid', failed:'finance.status.failed', cancelled:'finance.status.cancelled' }[normalized];
      return key ? tkText(key, status) : tkText('finance.status.default', 'Statut indisponible');
    }

    function getHistoryStatusClass(status) {
      const normalized = String(status || '').toLowerCase();
      if (normalized === 'approved') return 'history-badge success';
      if (normalized === 'rejected') return 'history-badge danger';
      return 'history-badge pending';
    }

    function formatHistoryAmount(type, amount, currency) {
      const numericAmount = Number(amount || 0);
      const sign = type === 'deposit' ? '+' : '-';
      const formatted = numericAmount.toLocaleString(window.TKI18n?.getLocale?.() || 'fr-FR');
      return `${sign} ${formatted} ${currency || 'HTG'}`;
    }

    function renderQuickHistory(container, items) {
      if (!container) return;

      dashboardTranslationState.quickHistoryItems = Array.isArray(items) ? items : [];

      if (!items || !items.length) {
        container.innerHTML = `
          <div class="empty-history-inner">
            <span class="empty-icon"><svg viewBox="0 0 24 24"><path d="M12 6v6l4 2"/><circle cx="12" cy="12" r="9"/></svg></span>
            <div>
              <strong>${tkText('common.no_recent_activity', 'Aucune activité récente')}</strong>
              <p>${tkText('common.no_recent_activity_description', 'Vos dépôts et retraits apparaîtront ici.')}</p>
              <a class="history-empty-cta" href="deposit.html">${tkText('common.make_a_deposit', 'Faire un dépôt')}</a>
            </div>
          </div>`;
        return;
      }

      const feed = document.createElement('div');
      feed.className = 'history-feed';
      feed.innerHTML = items.map((item) => {
        const isDeposit = item.type === 'deposit';
        const label = isDeposit ? tkText('common.deposit', 'Dépôt') : tkText('common.withdraw', 'Retrait');
        const amountClass = isDeposit ? 'history-amount positive' : 'history-amount negative';
        const dateLabel = item.created_at ? new Date(item.created_at).toLocaleDateString(window.TKI18n?.getLocale?.() || 'fr-FR') : '—';
        const iconSvg = isDeposit
          ? '<svg viewBox="0 0 24 24"><path d="M12 3v12"/><path d="m7 10 5 5 5-5"/><path d="M5 21h14"/></svg>'
          : '<svg viewBox="0 0 24 24"><path d="M12 21V9"/><path d="m7 14 5-5 5 5"/><path d="M5 3h14"/></svg>';

        return `
          <div class="history-item">
            <div class="history-icon">${iconSvg}</div>
            <div class="history-main">
              <strong>${label}</strong>
              <span>${dateLabel}</span>
            </div>
            <div class="history-meta">
              <span class="${amountClass}">${formatHistoryAmount(item.type, item.amount, item.currency)}</span>
              <span class="${getHistoryStatusClass(item.status)}">${getHistoryStatusLabel(item.status)}</span>
            </div>
          </div>`;
      }).join('');

      container.innerHTML = '';
      container.appendChild(feed);
    }

    function applyLocalizedDashboardText(data) {
      if (!data || !document) {
        return data;
      }

      const user = data.user || {};
      const profile = data.profile || {};
      const wallet = data.wallet || {};
      const currentUser = data.currentUser || {};
      const displayName = profile.full_name || currentUser.full_name || user.user_metadata?.full_name || user.user_metadata?.name || user.email || tkText('common.player', 'Joueur');
      const statusValue = String(profile.status || 'active').toLowerCase();
      const statusLabel = statusValue === 'active'
        ? tkText('common.active', 'Actif')
        : (profile.status || tkText('common.active', 'Actif'));

      const greetingEl = document.querySelector('[data-dashboard-greeting]');
      if (greetingEl && window.TKI18n && typeof window.TKI18n.t === 'function') {
        greetingEl.textContent = window.TKI18n.t('dashboard.greeting', { name: displayName });
      }

      const roleValue = String(profile.role || currentUser.role || 'client').toLowerCase();
      const roleLabel = roleValue === 'client'
        ? tkText('common.client', 'Client')
        : (profile.role || currentUser.role || tkText('common.client', 'Client'));

      const nameEl = document.querySelector('[data-dashboard-name]');
      if (nameEl) {
        nameEl.textContent = displayName;
      }

      const emailEl = document.querySelector('[data-dashboard-email]');
      if (emailEl) {
        emailEl.textContent = profile.email || currentUser.email || user.email || '—';
      }

      const statusEl = document.querySelector('[data-dashboard-status]');
      if (statusEl) {
        statusEl.textContent = statusLabel;
      }

      const roleEl = document.querySelector('[data-dashboard-role]');
      if (roleEl) {
        roleEl.textContent = roleLabel;
      }

      const statusChipEl = document.querySelector('[data-dashboard-status-chip]');
      if (statusChipEl) {
        statusChipEl.textContent = statusLabel;
      }

      const currency = wallet.currency || 'HTG';
      const balanceCardEl = document.querySelector('[data-dashboard-balance-card]');
      if (balanceCardEl) {
        balanceCardEl.textContent = `${Number(wallet.balance || 0).toLocaleString(window.TKI18n?.getLocale?.() || 'fr-FR')} ${currency}`;
      }

      return data;
    }

    function refreshDashboardLanguageUi() {
      if (window.TKI18n && typeof window.TKI18n.t === 'function') {
        document.title = window.TKI18n.t('dashboard.title');
        window.TKI18n.applyTranslations(document);
      }

      if (dashboardTranslationState.dashboardData) {
        applyLocalizedDashboardText(dashboardTranslationState.dashboardData);
      }

      const historyContainer = document.querySelector('[data-dashboard-transactions]');
      if (historyContainer) {
        renderQuickHistory(historyContainer, dashboardTranslationState.quickHistoryItems);
      }
    }

    function setDashboardRenderer() {
      window.renderDashboardPage = function dashboardLocalizedRenderer(data) {
        const result = typeof originalRenderDashboardPage === 'function' ? originalRenderDashboardPage(data) : null;
        dashboardTranslationState.dashboardData = data || null;
        applyLocalizedDashboardText(data);

        const historyContainer = document.querySelector('[data-dashboard-transactions]');
        if (historyContainer) {
          const transactions = Array.isArray(data?.transactions) ? data.transactions : [];
          renderQuickHistory(historyContainer, transactions.length ? transactions : []);
        }

        return result;
      };
    }

    async function resolveDashboardLanguagePreference() {
      const currentUser = await (window.getCurrentUserAsync ? window.getCurrentUserAsync() : (window.getCurrentUser ? window.getCurrentUser() : null));
      if (window.supabaseClient && currentUser?.id) {
        try {
          const { data, error } = await window.supabaseClient
            .from('user_settings')
            .select('language')
            .eq('user_id', currentUser.id)
            .maybeSingle();

          if (!error && data?.language) {
            return window.TKI18n.normalizeLanguage(data.language);
          }
        } catch (error) {
          console.warn('Unable to read user_settings.language for dashboard.', error);
        }
      }

      try {
        const storedLanguage = window.localStorage?.getItem('tk_language');
        if (storedLanguage) {
          return window.TKI18n.normalizeLanguage(storedLanguage);
        }
      } catch (error) {
        console.warn('Unable to read localStorage language for dashboard.', error);
      }

      return 'fr';
    }

    async function loadQuickHistory() {
      const container = document.querySelector('[data-dashboard-transactions]');
      if (!container) return;

      const currentUser = await (window.getCurrentUserAsync ? window.getCurrentUserAsync() : (window.getCurrentUser ? window.getCurrentUser() : null));
      const client = window.supabaseClient || null;
      const userId = currentUser?.id;

      if (!userId || !client || typeof client.from !== 'function') {
        container.innerHTML = `<div class="empty-history-inner"><div><strong>${tkText('common.cannot_load_recent_activity', 'Impossible de charger vos dernières activités.')}</strong></div></div>`;
        return;
      }

      try {
        const [{ data: deposits = [], error: depositError }, { data: withdrawals = [], error: withdrawalError }] = await Promise.all([
          client
            .from('deposit_requests')
            .select('id, amount, currency, status, created_at, method')
            .eq('user_id', userId)
            .order('created_at', { ascending: false })
            .limit(4),
          client
            .from('withdrawal_requests')
            .select('id, amount, currency, status, created_at, method')
            .eq('user_id', userId)
            .order('created_at', { ascending: false })
            .limit(4)
        ]);

        if (depositError || withdrawalError) {
          throw depositError || withdrawalError;
        }

        const merged = [
          ...(deposits || []).map((item) => ({ ...item, type: 'deposit' })),
          ...(withdrawals || []).map((item) => ({ ...item, type: 'withdrawal' }))
        ]
          .sort((a, b) => new Date(b.created_at || 0) - new Date(a.created_at || 0))
          .slice(0, 4);

        dashboardTranslationState.quickHistoryItems = merged;
        renderQuickHistory(container, merged);
      } catch (error) {
        console.error('Erreur chargement historique rapide.', error);
        container.innerHTML = `<div class="empty-history-inner"><div><strong>${tkText('common.cannot_load_recent_activity', 'Impossible de charger vos dernières activités.')}</strong></div></div>`;
      }
    }

    setDashboardRenderer();

    (async () => {
      const preferredLanguage = await resolveDashboardLanguagePreference();

      if (window.TKI18n && typeof window.TKI18n.init === 'function') {
        await window.TKI18n.init({ language: preferredLanguage });
        window.TKI18n.onLanguageChanged(refreshDashboardLanguageUi);
        window.addEventListener('storage', (event) => {
          if (event.key === 'tk_language' && event.newValue && window.TKI18n && typeof window.TKI18n.setLanguage === 'function') {
            window.TKI18n.setLanguage(event.newValue);
          }
        });
        document.title = window.TKI18n.t('dashboard.title');
      }

      const currentUser = await (window.getCurrentUserAsync ? window.getCurrentUserAsync() : (window.getCurrentUser ? window.getCurrentUser() : null));
      if (!currentUser) {
        const target = window.location.pathname.split('/').filter(Boolean).slice(-2).join('/') || 'dashboard.html';
        window.saveRedirectTarget?.(target);
        window.tryRedirectToLogin('login-register/login.html');
        return;
      }

      const dashboardData = await (window.getAuthenticatedDashboardData ? window.getAuthenticatedDashboardData() : null);
      if (window.renderDashboardPage) {
        window.renderDashboardPage(dashboardData);
      }

      await loadQuickHistory();

      const role = String((dashboardData?.profile?.role || currentUser.role || 'client')).toLowerCase();
      const target = window.resolveRoleDestination ? window.resolveRoleDestination(role) : 'dashboard.html';
      if (window.location.pathname.split('/').pop() !== target.split('/').pop()) {
        window.location.replace(target);
      }
    })();

    (async function initHeaderPremium() {
      const userMenuWrap = document.getElementById('userMenuWrap');
      const userMenuButton = document.getElementById('userMenuButton');
      const userMenu = document.getElementById('userMenu');
      const userAvatar = document.getElementById('userAvatar');
      const logoutMenuBtn = document.getElementById('logoutMenuBtn');
      const walletBalanceEl = document.getElementById('wallet-balance');
function closeUserMenu() {
        userMenu?.classList.remove('open');
        userMenuButton?.setAttribute('aria-expanded', 'false');
        userMenu?.setAttribute('aria-hidden', 'true');
      }

      function toggleUserMenu(event) {
        event.preventDefault();
        event.stopPropagation();

        const willOpen = !userMenu?.classList.contains('open');
        userMenu?.classList.toggle('open', willOpen);
        userMenuButton?.setAttribute('aria-expanded', String(willOpen));
        userMenu?.setAttribute('aria-hidden', String(!willOpen));
      }

      userMenuButton?.addEventListener('click', toggleUserMenu);

      userMenu?.addEventListener('click', (event) => {
        event.stopPropagation();
      });

      document.addEventListener('click', (event) => {
        if (!userMenuWrap?.contains(event.target)) {
          closeUserMenu();
        }
      });

      document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape') {
          closeUserMenu();
          userMenuButton?.focus();
        }
      });

      logoutMenuBtn?.addEventListener('click', async () => {
        if (window.logoutUser) {
          const result = await window.logoutUser();
          if (result?.ok !== false) {
            window.tryRedirectToLogin?.('login-register/login.html');
          }
          return;
        }

        if (window.supabaseClient?.auth?.signOut) {
          await window.supabaseClient.auth.signOut();
          window.location.href = 'login-register/login.html';
        }
      });

      try {
        const currentUser = window.getCurrentUserAsync
          ? await window.getCurrentUserAsync()
          : (window.getCurrentUser ? window.getCurrentUser() : null);

        if (!currentUser) {
          return;
        }

        if (userMenuWrap) {
          userMenuWrap.hidden = false;
        }

        const metadata =
          currentUser.user_metadata ||
          currentUser.raw_user_meta_data ||
          {};

        const displayName =
          currentUser.full_name ||
          metadata.full_name ||
          metadata.name ||
          currentUser.email ||
          tkText('common.player', 'Joueur');

        const email =
          currentUser.email ||
          metadata.email ||
          '—';

        const avatarUrl =
          currentUser.avatar_url ||
          metadata.avatar_url ||
          metadata.picture ||
          currentUser.picture ||
          '';
if (userAvatar) {
          userAvatar.innerHTML = '';

          if (avatarUrl) {
            const image = document.createElement('img');
            image.src = avatarUrl;
            image.alt = displayName;
            image.loading = 'lazy';
            image.referrerPolicy = 'no-referrer';
            image.addEventListener('error', () => {
              userAvatar.textContent =
                String(displayName).trim().charAt(0).toUpperCase() || 'U';
            }, { once:true });
            userAvatar.appendChild(image);
          } else {
            userAvatar.textContent =
              String(displayName).trim().charAt(0).toUpperCase() || 'U';
          }
        }

        if (window.getAuthenticatedWallet && walletBalanceEl) {
          const wallet = await window.getAuthenticatedWallet();

          if (wallet) {
            const balance = Number(wallet.balance || 0);
            const currency = wallet.currency || 'HTG';
            walletBalanceEl.textContent =
              `${balance.toLocaleString(window.TKI18n?.getLocale?.() || 'fr-FR')} ${currency}`;
          }
        }
      } catch (error) {
        console.warn("Erreur d'initialisation du header dashboard :", error);
      }
    })();
  </script>
