<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="0; url=jeux/lotto5.html">
  <meta name="robots" content="noindex">
  <title>Redirection vers Lotto 5 — Tonton Kondo</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: "Segoe UI", Arial, sans-serif;
      background: #020813;
      color: #f5f7fb;
    }
    * { box-sizing: border-box; }
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 18px;
      background:
        radial-gradient(circle at 80% 0%, rgba(255, 210, 31, .12), transparent 24%),
        linear-gradient(180deg, #010610, #061426 48%, #020813);
    }
    main {
      width: min(100%, 560px);
      padding: clamp(22px, 5vw, 36px);
      border: 1px solid rgba(255, 255, 255, .13);
      border-radius: 24px;
      background: rgba(8, 24, 43, .96);
      box-shadow: 0 24px 60px rgba(0, 0, 0, .45);
      text-align: center;
    }
    strong {
      display: block;
      color: #ffd21f;
      font-size: clamp(25px, 6vw, 36px);
    }
    p {
      margin: 14px auto 22px;
      color: #c7d2e3;
      line-height: 1.6;
    }
    a {
      display: inline-flex;
      min-height: 48px;
      align-items: center;
      justify-content: center;
      padding: 12px 18px;
      border-radius: 14px;
      background: linear-gradient(180deg, #ffd21f, #ffb900);
      color: #111;
      font-weight: 900;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main>
    <strong>Ouverture de Lotto 5</strong>
    <p>
      Cette ancienne adresse vous redirige vers la page officielle du jeu.
    </p>
    <a href="jeux/lotto5.html">Accéder à Lotto 5</a>
  </main>
  <script>
    window.location.replace('jeux/lotto5.html');
  </script>
</body>
</html>
