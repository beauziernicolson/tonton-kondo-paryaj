<style>
    :root {
      --bg:#020813;
      --panel:#07182b;
      --panel-2:#0d223a;
      --line:rgba(255,255,255,.10);
      --text:#f5f7fb;
      --muted:#aebbd0;
      --gold:#ffd21f;
      --radius-xl:28px;
      --shadow:0 24px 60px rgba(0,0,0,.45);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 70% 0%, rgba(255,210,31,.10), transparent 22%),
        radial-gradient(circle at 10% 8%, rgba(57,168,255,.12), transparent 28%),
        linear-gradient(180deg, #010610 0%, #061426 45%, #020813 100%);
    }
    a { color: inherit; text-decoration: none; }
    .mobile-header{display:grid;grid-template-columns:1fr auto auto;align-items:center;gap:12px;padding:8px 0 16px;border-bottom:1px solid var(--line);margin-bottom:24px}
    .brand{display:flex;align-items:center;min-width:0;text-decoration:none;color:inherit}.brand-block{display:flex;align-items:center;gap:12px}.brand-icon{width:56px;height:56px;object-fit:contain;flex-shrink:0;display:block}.brand-text{display:flex;flex-direction:column;line-height:1}.brand-top,.brand-middle{display:block;font-weight:900;font-size:22px;letter-spacing:.04em}.brand-top{color:#fff}.brand-middle{color:var(--gold)}.brand-bottom{position:relative;display:block;margin-top:4px;text-align:center;color:#d7dde8;font-size:9px;font-weight:800;letter-spacing:.5em}.brand-bottom::before,.brand-bottom::after{content:"";position:absolute;top:50%;width:22px;height:1px;background:rgba(255,255,255,.35)}.brand-bottom::before{right:100%;margin-right:8px}.brand-bottom::after{left:100%;margin-left:8px}
    .wallet-chip{display:flex;align-items:center;gap:8px;background:rgba(9,30,54,.92);border:1px solid var(--line);border-radius:17px;padding:10px 12px;box-shadow:var(--shadow);white-space:nowrap}.wallet-chip strong{display:block;font-size:15px}.wallet-chip span{display:block;color:var(--muted);font-size:12px;margin-top:-2px}
    .header-actions{display:flex;align-items:center;gap:8px}.action-btn{width:42px;height:42px;border-radius:50%;border:1px solid var(--line);background:rgba(8,24,43,.95);color:var(--gold);position:relative;display:grid;place-items:center;box-shadow:var(--shadow);text-decoration:none}.user-button{width:42px;height:42px;border-radius:999px;padding:0;overflow:hidden;background:linear-gradient(135deg,rgba(255,210,31,.18),rgba(57,168,255,.18));border:1px solid rgba(255,255,255,.16);color:#fff;display:grid;place-items:center}.user-avatar{width:100%;height:100%;display:grid;place-items:center;font-size:13px;font-weight:900;text-transform:uppercase;letter-spacing:.08em;background:linear-gradient(135deg,#1b3353,#07111e)}.badge{position:absolute;right:-2px;top:-5px;background:var(--gold);color:#111;border-radius:999px;font-size:11px;font-weight:900;min-width:19px;height:19px;display:grid;place-items:center;border:2px solid #061426}.user-menu-wrap{position:relative}.user-menu{position:absolute;top:calc(100% + 8px);right:0;min-width:220px;display:none;grid-template-columns:1fr;gap:4px;padding:8px;border:1px solid var(--line);border-radius:16px;background:rgba(7,24,43,.98);box-shadow:var(--shadow);z-index:50}.user-menu.open{display:grid}.user-menu-link{display:block;padding:10px 12px;border-radius:12px;border:1px solid transparent;color:#f3f7ff;font-size:13px;font-weight:700;text-decoration:none;background:transparent}.user-menu-link:hover{background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.08)}.user-menu-divider{height:1px;background:rgba(255,255,255,.08);margin:4px 0}.user-menu-logout{color:#ffd6d6}
    .page { width: min(100%, 1080px); margin: 0 auto; padding: 18px 16px 56px; }
    .card {
      border: 1px solid var(--line); border-radius: var(--radius-xl); background: rgba(7, 24, 43, .92);
      box-shadow: var(--shadow); padding: 18px; margin-bottom: 20px;
    }
    .topbar { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom: 12px; }
    .eyebrow { color: var(--gold); text-transform: uppercase; letter-spacing: .18em; font-size: 11px; font-weight: 800; }
    h1 { margin: 4px 0 6px; font-size: clamp(28px, 6vw, 38px); line-height: 1.02; }
    p { color: var(--muted); margin: 0; }
    .grid { display:grid; grid-template-columns: repeat(2, 1fr); gap:18px; }
    .item { border: 1px solid var(--line); border-radius:18px; background: linear-gradient(180deg, rgba(13,34,58,.98), rgba(7,19,35,.98)); padding:14px; }
    .item h2 { font-size: 18px; margin: 0 0 6px; }
    .item p { font-size: 14px; }
    .chip { display:inline-flex; align-items:center; border-radius:999px; padding:6px 10px; background: rgba(255,255,255,.04); border:1px solid var(--line); color: var(--muted); font-size: 12px; font-weight: 700; }
    .btn { display:inline-flex; align-items:center; justify-content:center; gap:8px; border-radius:14px; border:1px solid var(--line); background: rgba(255,255,255,.04); color: #fff; padding:10px 12px; font-weight:800; }
    .btn-primary { background: linear-gradient(180deg, var(--gold), #ffb900); color: #111; border-color: transparent; }
    .notifications-list { display:grid; gap:12px; margin-top:14px; }
    .notification-row { display:flex; align-items:center; justify-content:space-between; gap:14px; padding:10px 0; border-top:1px solid rgba(255,255,255,.06); }
    .notification-row:first-child { border-top:0; padding-top:0; }
    .notification-copy { display:grid; gap:3px; min-width:0; }
    .notification-copy strong { font-size:15px; }
    .notification-copy span { color: var(--muted); font-size:13px; }
    .switch-shell { position:relative; display:inline-flex; align-items:center; }
    .switch-shell input { position:absolute; inset:0; opacity:0; pointer-events:none; }
    .switch-track { position:relative; display:inline-flex; align-items:center; width:52px; height:30px; border-radius:999px; background: rgba(255,255,255,.12); border:1px solid var(--line); transition: background .18s ease, border-color .18s ease; }
    .switch-thumb { position:absolute; top:3px; left:3px; width:22px; height:22px; border-radius:50%; background:#fff; box-shadow: 0 3px 8px rgba(0,0,0,.28); transition: transform .18s ease; }
    .switch-shell input:checked + .switch-track { background: rgba(255,210,31,.38); border-color: rgba(255,210,31,.55); }
    .switch-shell input:checked + .switch-track .switch-thumb { transform: translateX(22px); background: var(--gold); }
    .switch-shell input:disabled + .switch-track { opacity:.62; cursor:wait; }
    .settings-inline-status { min-height:20px; margin-top:12px; font-size:12px; font-weight:700; color: var(--gold); }
    .settings-inline-status.error { color:#ffb3b3; }
    .language-field { display:grid; gap:10px; margin-top:14px; }
    .language-field label { font-size:14px; font-weight:800; color: var(--text); }
    .language-select {
      width: 100%;
      max-width: 100%;
      padding: 11px 12px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.14);
      background: #07182b;
      color: #fff;
      font: inherit;
      font-weight: 700;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.05);
    }
    .language-select:focus {
      outline: 2px solid rgba(255,210,31,.6);
      outline-offset: 1px;
      border-color: rgba(255,210,31,.55);
    }
    .language-select:disabled { opacity: .72; cursor: wait; }
    .language-select option { background: #07182b; color: #fff; }
    .language-help { color: var(--muted); font-size: 13px; line-height: 1.5; }
    @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
    @media (max-width: 640px) { .notification-row { align-items:flex-start; } .notification-copy span { max-width: 100%; } }
  </style>

<script>
    (async function protectSettingsPage() {
      const user = await window.getCurrentUserAsync?.();
      const client = window.getSupabaseClient ? await window.getSupabaseClient() : null;
      const notificationsLoading = document.getElementById('notificationsLoading');
      const notificationSaveStatus = document.getElementById('notificationSaveStatus');
      const languageSelect = document.getElementById('languageSelect');
      const languageStatus = document.getElementById('languageStatus');
      const switches = Array.from(document.querySelectorAll('.setting-switch'));
      const allowedLanguages = Array.isArray(window.TKI18n?.SUPPORTED_LANGUAGES)
        ? window.TKI18n.SUPPORTED_LANGUAGES
        : ['fr', 'ht', 'en'];
      let currentSettings = null;

      function setSaveStatus(message, type = 'info') {
        if (!notificationSaveStatus) {
          return;
        }

        notificationSaveStatus.textContent = message || '';
        notificationSaveStatus.classList.toggle('error', type === 'error');
      }

      function setLanguageStatus(message, type = 'info') {
        if (!languageStatus) {
          return;
        }

        languageStatus.textContent = message || '';
        languageStatus.classList.toggle('error', type === 'error');
      }

      async function ensureCurrentSettings() {
        if (!client) {
          return null;
        }

        const {
          data: { user: authUser },
          error: authUserError
        } = await client.auth.getUser();

        if (authUserError || !authUser?.id) {
          console.error('Impossible de récupérer l’utilisateur Auth :', authUserError);
          setSaveStatus(`${window.TKI18n.t('common.error')} ${window.TKI18n.t('common.retry')}`, 'error');
          notificationsLoading.hidden = true;
          return null;
        }

        const userId = authUser.id;

        console.log('SETTINGS auth.uid utilisé :', userId);
        console.log('SETTINGS profil id disponible :', user?.id || null);

        const { data: rpcData, error: rpcError } = await client.rpc(
          'ensure_user_settings',
          {
            p_user_id: userId
          }
        );

        if (rpcError) {
          console.error('ensure_user_settings error full:', rpcError);
          throw rpcError;
        }

        const { data, error: selectError } = await client
          .from('user_settings')
          .select('*')
          .eq('user_id', authUser.id)
          .maybeSingle();

        if (selectError) {
          throw selectError;
        }

        return data;
      }

      function applySettingsRow(settings) {
        currentSettings = settings || currentSettings;

        switches.forEach((input) => {
          const key = input.dataset.column;
          const nextValue = Boolean(currentSettings?.[key]);
          input.checked = nextValue;
          input.dataset.previousValue = String(nextValue);
        });

        if (languageSelect) {
          const normalizedLanguage = window.TKI18n.normalizeLanguage(currentSettings?.language);
          languageSelect.value = normalizedLanguage;
          languageSelect.dataset.previousValue = normalizedLanguage;
        }
      }

      async function saveSinglePreference(column, value) {
        if (!client || !user?.id) {
          return false;
        }

        const targetInput = document.querySelector(`[data-column="${column}"]`);
        if (targetInput) {
          targetInput.disabled = true;
        }

        const { error } = await client
          .from('user_settings')
          .update({ [column]: value })
          .eq('user_id', user.id);

        if (targetInput) {
          targetInput.disabled = false;
        }

        if (error) {
          if (targetInput) {
            targetInput.checked = !value;
          }
          return false;
        }

        return true;
      }

      async function saveLanguagePreference(nextValue) {
        if (!languageSelect || !client) {
          return false;
        }

        const safeValue = window.TKI18n.normalizeLanguage(nextValue);
        const targetUserId = currentSettings?.user_id || user?.id;

        if (!allowedLanguages.includes(safeValue) || !targetUserId) {
          return false;
        }

        const previousValue = window.TKI18n.normalizeLanguage(languageSelect.dataset.previousValue || 'fr');

        languageSelect.disabled = true;
        setLanguageStatus(window.TKI18n.t('common.loading'));

        try {
          const { error } = await client
            .from('user_settings')
            .update({ language: safeValue })
            .eq('user_id', targetUserId);

          if (error) {
            console.error('Erreur UPDATE user_settings.language full:', error);
            languageSelect.value = previousValue;
            languageSelect.dataset.previousValue = previousValue;
            if (currentSettings) {
              currentSettings.language = previousValue;
            }
            languageSelect.disabled = false;
            await window.TKI18n.setLanguage(previousValue);
            setLanguageStatus(window.TKI18n.t('common.error'), 'error');
            return false;
          }

          languageSelect.dataset.previousValue = safeValue;
          if (currentSettings) {
            currentSettings.language = safeValue;
          }
          languageSelect.disabled = false;
          await window.TKI18n.setLanguage(safeValue);
          setLanguageStatus(window.TKI18n.t('common.save'));
          window.setTimeout(() => {
            setLanguageStatus('');
          }, 2000);
          return true;
        } catch (error) {
          console.error('Erreur UPDATE user_settings.language full:', error);
          languageSelect.value = previousValue;
          languageSelect.dataset.previousValue = previousValue;
          if (currentSettings) {
            currentSettings.language = previousValue;
          }
          languageSelect.disabled = false;
          await window.TKI18n.setLanguage(previousValue);
          setLanguageStatus(window.TKI18n.t('common.error'), 'error');
          return false;
        }
      }

      switches.forEach((input) => {
        input.addEventListener('change', async () => {
          const column = input.dataset.column;
          const previousValue = input.dataset.previousValue === 'true';
          const value = input.checked;

          input.disabled = true;
          setSaveStatus(window.TKI18n.t('common.loading'));

          const ok = await saveSinglePreference(column, value);

          input.disabled = false;

          if (!ok) {
            input.checked = previousValue;
            input.dataset.previousValue = String(previousValue);
            setSaveStatus(window.TKI18n.t('common.error'), 'error');
            return;
          }

          input.dataset.previousValue = String(value);
          setSaveStatus(window.TKI18n.t('common.save'));
          window.setTimeout(() => {
            setSaveStatus('');
          }, 2000);
        });
      });

      languageSelect?.addEventListener('change', async () => {
        const requestedValue = languageSelect.value;
        if (!allowedLanguages.includes(requestedValue)) {
          const previousValue = window.TKI18n.normalizeLanguage(languageSelect.dataset.previousValue || 'fr');
          languageSelect.value = previousValue;
          setLanguageStatus(window.TKI18n.t('common.error'), 'error');
          return;
        }

        await saveLanguagePreference(requestedValue);
      });

      try {
        notificationsLoading.hidden = false;
        const settings = await ensureCurrentSettings();
        applySettingsRow(settings);
        await window.TKI18n.init({
          language: settings?.language || 'fr'
        });
        document.title = window.TKI18n.t('common.settings');
        notificationsLoading.hidden = true;
      } catch (error) {
        notificationsLoading.hidden = true;
        const errorDetails = error?.message || JSON.stringify(error);
        console.error('ensure_user_settings page catch:', error);
        setSaveStatus(`${window.TKI18n.t('common.error')} ${errorDetails}`, 'error');
      }
    })();
  </script>
