<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Tonton Kondo — Profil</title>
<style>
    :root {
      --bg:#020813;
      --panel:rgba(8,24,43,.92);
      --line:rgba(255,255,255,.10);
      --text:#f5f7fb;
      --muted:#aebbd0;
      --gold:#ffd21f;
      --gold-2:#ffb900;
      --green:#46e36f;
      --shadow:0 24px 60px rgba(0,0,0,.45);
    }

    * { box-sizing: border-box; }
    body {
      margin:0;
      min-height:100vh;
      font-family:"Segoe UI", Arial, sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 80% 0%, rgba(255,210,31,.10), transparent 18%),
        radial-gradient(circle at 15% 8%, rgba(57,168,255,.12), transparent 22%),
        linear-gradient(180deg, #010610 0%, #061426 45%, #020813 100%);
      line-height:1.5;
    }

    a { color: inherit; text-decoration: none; }
    button { font: inherit; }

    .app { width:min(100%, 1100px); margin:0 auto; padding:18px 16px 40px; }
    .topbar { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:18px; }
    .brand { display:flex; align-items:center; gap:12px; color:#fff; }
    .brand img { width:56px; height:56px; border-radius:16px; object-fit:contain; background: rgba(255,255,255,.04); padding:6px; }
    .brand-text strong { display:block; font-size:18px; letter-spacing:.03em; }
    .brand-text span { display:block; color:var(--muted); font-size:12px; text-transform:uppercase; letter-spacing:.35em; }

    .shell { display:grid; grid-template-columns: 1fr .9fr; gap:18px; }
    .panel { border:1px solid var(--line); border-radius:28px; background:linear-gradient(180deg, rgba(8,24,43,.96), rgba(5,17,31,.96)); box-shadow:var(--shadow); padding:18px; }
    .badge-tag { display:inline-flex; align-items:center; gap:8px; width:fit-content; border-radius:999px; padding:8px 10px; background: rgba(255,210,31,.08); color:var(--gold); text-transform:uppercase; letter-spacing:.2em; font-size:11px; font-weight:900; border:1px solid rgba(255,210,31,.15); }

    .panel h1 { margin:10px 0 6px; font-size: clamp(28px, 6vw, 36px); line-height:1.05; }
    .panel p { color: var(--muted); margin-top:0; }

    .profile-card { border:1px solid var(--line); border-radius:22px; padding:14px; background: rgba(255,255,255,.03); display:grid; gap:10px; }
    .profile-row { display:flex; align-items:center; justify-content:space-between; gap:10px; }
    .avatar { width:56px; height:56px; border-radius:50%; display:grid; place-items:center; background: linear-gradient(135deg, rgba(255,210,31,.18), rgba(57,168,255,.18)); color: var(--gold); font-weight:900; font-size:18px; }

    .info-grid { display:grid; gap:10px; margin-top:14px; }
    .info-item { border:1px solid var(--line); border-radius:18px; padding:12px; background: rgba(255,255,255,.03); }
    .info-item span { display:block; color: var(--muted); font-size:12px; text-transform:uppercase; letter-spacing:.14em; }
    .info-item strong { display:block; color:#fff; font-size:15px; margin-top:3px; }

    .status { border:1px solid rgba(70,227,111,.22); border-radius:16px; padding:10px; background: rgba(70,227,111,.08); color:#d8ffe6; font-weight:700; }

    .btn { display:inline-flex; align-items:center; justify-content:center; gap:8px; border-radius:14px; border:0; padding:12px 14px; font-weight:900; cursor:pointer; margin-top:10px; }
    .btn-primary { background: linear-gradient(180deg, var(--gold), var(--gold-2)); color:#111; box-shadow:0 10px 28px rgba(255,210,31,.22); }
    .btn-secondary { background: rgba(255,255,255,.04); border:1px solid var(--line); color:#fff; }

    .mini-note { color: var(--muted); font-size:13px; margin-top:10px; }

    @media (max-width: 980px) { .shell { grid-template-columns: 1fr; } }
    @media (max-width: 640px) { .app { padding:12px 12px 28px; } .panel { border-radius:22px; padding:16px; } }

    /* Styles du Header Premium Harmonisé */
    .mobile-header {
      display: grid;
      grid-template-columns: 1fr auto auto;
      align-items: center;
      gap: 12px;
      padding: 8px 0 16px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 24px;
    }
    .brand { display: flex; align-items: center; min-width: 0; text-decoration: none; color: inherit; }
    .brand-block { display: flex; align-items: center; gap: 12px; }
    .brand-icon { width: 56px; height: 56px; object-fit: contain; flex-shrink: 0; display: block; }
    .brand-text { display: flex; flex-direction: column; line-height: 1; }
    .brand-top, .brand-middle { display: block; font-weight: 900; font-size: 22px; letter-spacing: .04em; }
    .brand-top { color: #fff; }
    .brand-middle { color: var(--gold); }
    .brand-bottom {
      position: relative; display: block; margin-top: 4px; text-align: center;
      color: #d7dde8; font-size: 9px; font-weight: 800; letter-spacing: .5em;
    }
    .brand-bottom::before, .brand-bottom::after {
      content: ""; position: absolute; top: 50%; width: 22px; height: 1px; background: rgba(255, 255, 255, .35);
    }
    .brand-bottom::before { right: 100%; margin-right: 8px; }
    .brand-bottom::after { left: 100%; margin-left: 8px; }

    .wallet-chip {
      display: flex; align-items: center; gap: 8px; background: rgba(9, 30, 54, .92);
      border: 1px solid var(--line); border-radius: 17px; padding: 10px 12px; box-shadow: var(--shadow, 0 24px 60px rgba(0,0,0,.45)); white-space: nowrap;
    }
    .wallet-chip strong { display: block; font-size: 15px; }
    .wallet-chip span { display: block; color: var(--muted); font-size: 12px; margin-top: -2px; }

    .header-actions { display: flex; align-items: center; gap: 8px; }
    .action-btn {
      width: 42px; height: 42px; border-radius: 50%; border: 1px solid var(--line);
      background: rgba(8, 24, 43, .95); color: var(--gold); position: relative;
      display: grid; place-items: center; box-shadow: var(--shadow, 0 24px 60px rgba(0,0,0,.45)); text-decoration: none;
    }
    .user-menu-wrap { position: relative; }
    .user-button {
      width: 42px; height: 42px; border-radius: 999px; padding: 0; overflow: hidden;
      background: linear-gradient(135deg, rgba(255, 210, 31, .18), rgba(57, 168, 255, .18));
      border: 1px solid rgba(255, 255, 255, .16); color: #fff; display: grid; place-items: center;
    }
    .user-avatar {
      width: 100%; height: 100%; display: grid; place-items: center; font-size: 13px; font-weight: 900;
      text-transform: uppercase; letter-spacing: .08em; background: linear-gradient(135deg, #1b3353, #07111e);
    }
    .user-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .user-menu {
      position: absolute; top: calc(100% + 8px); right: 0; min-width: 220px;
      background: linear-gradient(180deg, rgba(7, 20, 35, .98), rgba(4, 12, 22, .98));
      border: 1px solid rgba(255, 255, 255, .12); border-radius: 18px; box-shadow: 0 20px 50px rgba(0,0,0,.45);
      padding: 8px; display: none; z-index: 120;
    }
    .user-menu.open { display: grid; gap: 4px; }
    .user-menu-link {
      display: flex; align-items: center; justify-content: space-between;
      width: 100%; padding: 10px 12px; border-radius: 12px; border: 1px solid transparent;
      color: #edf4ff; text-decoration: none; font-size: 14px; font-weight: 700; background: transparent; text-align: left;
    }
    .user-menu-link:hover { background: rgba(255, 255, 255, .04); border-color: rgba(255, 255, 255, .08); }
    .user-menu-divider { height: 1px; background: rgba(255, 255, 255, .08); margin: 4px 0; }
    .user-menu-logout { color: #ffd6d6; }
    .badge {
      position: absolute; right: -2px; top: -5px; background: var(--gold); color: #111;
      border-radius: 999px; font-size: 11px; font-weight: 900; min-width: 19px; height: 19px;
      display: grid; place-items: center; border: 2px solid #061426;
    }

    @media (max-width: 760px) {
      .brand-icon { width: 44px; height: 44px; }
      .brand-top, .brand-middle { font-size: 18px; }
      .brand-bottom { font-size: 8px; }
      .wallet-chip { display: none !important; }
    }
  </style>

<script>
    const profilePageState = {
      data: null,
      currentUser: null
    };

    function tkText(key, fallback) {
      if (window.TKI18n && typeof window.TKI18n.t === 'function') {
        return window.TKI18n.t(key);
      }
      return fallback || key;
    }

    function formatStatusValue(value) {
      const rawValue = String(value || '').trim();
      if (!rawValue) return tkText('common.player_space_loading', 'Chargement…');
      return rawValue;
    }

    function renderProfileStaticLabels() {
      if (!window.TKI18n || typeof window.TKI18n.applyTranslations !== 'function') {
        return;
      }
      document.title = tkText('profile.page_title', 'Tonton Kondo — Profil');
      window.TKI18n.applyTranslations(document);
    }

    async function resolveProfileLanguagePreference() {
      const currentUser = await (window.getCurrentUserAsync ? window.getCurrentUserAsync() : (window.getCurrentUser ? window.getCurrentUser() : null));
      if (window.supabaseClient && currentUser?.id) {
        try {
          const { data, error } = await window.supabaseClient
            .from('user_settings')
            .select('language')
            .eq('user_id', currentUser.id)
            .maybeSingle();

          if (!error && data?.language) {
            return window.TKI18n.normalizeLanguage(data.language);
          }
        } catch (error) {
          console.warn('Unable to read user_settings.language for profile.', error);
        }
      }

      try {
        const storedLanguage = window.localStorage?.getItem('tk_language');
        if (storedLanguage) {
          return window.TKI18n.normalizeLanguage(storedLanguage);
        }
      } catch (error) {
        console.warn('Unable to read localStorage language for profile.', error);
      }

      return 'fr';
    }

    function refreshProfilePageUi() {
      renderProfileStaticLabels();

      const currentUser = profilePageState.currentUser || profilePageState.data?.currentUser || {};
      const profile = profilePageState.data?.profile || {};
      const wallet = profilePageState.data?.wallet || {};
      const user = profilePageState.data?.user || {};
      const displayName = profile.full_name || currentUser.full_name || user.user_metadata?.full_name || user.user_metadata?.name || currentUser.email || user.email || tkText('common.player', 'Joueur');
      const roleValue = String(profile.role || currentUser.role || user.role || 'client');
      const statusValue = String(profile.status || currentUser.status || 'active');

      const nameEl = document.querySelector('[data-profile-name]');
      if (nameEl) nameEl.textContent = displayName;

      const roleTagEl = document.querySelector('[data-profile-role-tag]');
      if (roleTagEl) roleTagEl.textContent = String(roleValue).toUpperCase();

      const accountStatusEl = document.querySelector('[data-profile-account-status]');
      if (accountStatusEl) {
        accountStatusEl.textContent = `${tkText('profile.status_prefix', 'Statut :')} ${formatStatusValue(statusValue)}`;
      }

      const nameFullEl = document.querySelector('[data-profile-name-full]');
      if (nameFullEl) nameFullEl.textContent = profile.full_name || currentUser.full_name || user.user_metadata?.full_name || user.user_metadata?.name || tkText('common.player_space_loading', 'Chargement…');

      const firstNameEl = document.querySelector('[data-profile-first-name]');
      if (firstNameEl) firstNameEl.textContent = profile.first_name || currentUser.first_name || user.user_metadata?.first_name || tkText('common.player_space_loading', 'Chargement…');

      const lastNameEl = document.querySelector('[data-profile-last-name]');
      if (lastNameEl) lastNameEl.textContent = profile.last_name || currentUser.last_name || user.user_metadata?.last_name || tkText('common.player_space_loading', 'Chargement…');

      const phoneEl = document.querySelector('[data-profile-phone]');
      if (phoneEl) phoneEl.textContent = profile.phone || currentUser.phone || user.phone || tkText('common.player_space_loading', 'Chargement…');

      const emailEl = document.querySelector('[data-profile-email]');
      if (emailEl) emailEl.textContent = profile.email || currentUser.email || user.email || tkText('common.player_space_loading', 'Chargement…');

      const roleEl = document.querySelector('[data-profile-role]');
      if (roleEl) roleEl.textContent = roleValue || tkText('common.player_space_loading', 'Chargement…');

      const statusEl = document.querySelector('[data-profile-status]');
      if (statusEl) statusEl.textContent = statusValue || tkText('common.player_space_loading', 'Chargement…');

      const balanceEl = document.querySelector('[data-profile-balance]');
      if (balanceEl) balanceEl.textContent = wallet.balance != null ? `${Number(wallet.balance || 0).toLocaleString(window.TKI18n?.getLocale?.() || 'fr-FR')} ${wallet.currency || 'HTG'}` : tkText('common.player_space_loading', 'Chargement…');

      const currencyEl = document.querySelector('[data-profile-currency]');
      if (currencyEl) currencyEl.textContent = wallet.currency || 'HTG';

      const walletStatusEl = document.querySelector('[data-profile-wallet-status]');
      if (walletStatusEl) walletStatusEl.textContent = wallet.status || tkText('common.player_space_loading', 'Chargement…');

      const providerEl = document.querySelector('[data-profile-provider]');
      if (providerEl) providerEl.textContent = wallet.provider || user.app_metadata?.provider || tkText('common.player_space_loading', 'Chargement…');

      const createdAtEl = document.querySelector('[data-profile-created-at]');
      if (createdAtEl) createdAtEl.textContent = profile.created_at || currentUser.created_at || user.created_at || tkText('common.player_space_loading', 'Chargement…');

      const providerSubEl = document.querySelector('[data-profile-provider-sub]');
      if (providerSubEl) providerSubEl.textContent = wallet.provider || user.app_metadata?.provider || tkText('common.player_space_loading', 'Chargement…');
    }

    (async () => {
      const preferredLanguage = await resolveProfileLanguagePreference();

      if (window.TKI18n && typeof window.TKI18n.init === 'function') {
        await window.TKI18n.init({ language: preferredLanguage });
        window.TKI18n.onLanguageChanged(refreshProfilePageUi);
        window.addEventListener('storage', (event) => {
          if (event.key === 'tk_language' && event.newValue && window.TKI18n && typeof window.TKI18n.setLanguage === 'function') {
            window.TKI18n.setLanguage(event.newValue);
          }
        });
      }
      renderProfileStaticLabels();
      const currentUser = await (window.getCurrentUserAsync ? window.getCurrentUserAsync() : null);
      if (!currentUser) {
        const target = window.location.pathname.split('/').filter(Boolean).slice(-2).join('/') || 'profile.html';
        window.saveRedirectTarget?.(target);
        window.tryRedirectToLogin('login-register/login.html');
        return;
      }

      const data = await (window.getAuthenticatedProfile ? window.getAuthenticatedProfile() : null);
      profilePageState.data = data || null;
      profilePageState.currentUser = currentUser || null;
      if (window.renderProfilePage) {
        window.renderProfilePage(data);
      }
      refreshProfilePageUi();

      const logoutBtn = document.getElementById('logoutBtn');
      logoutBtn?.addEventListener('click', async () => {
        const result = await window.logoutUser?.();
        if (result?.ok) {
          window.tryRedirectToLogin('login-register/login.html');
        } else {
          window.alert(result?.message || tkText('profile.logout_failed', 'Déconnexion impossible.'));
        }
      });
    })();

    // --- Initialisation du Header Premium Harmonisé ---
    (async function initHeaderPremium() {
      const userMenuWrap = document.getElementById('userMenuWrap');
      const userMenuButton = document.getElementById('userMenuButton');
      const userMenu = document.getElementById('userMenu');
      const userAvatar = document.getElementById('userAvatar');
      const logoutMenuBtn = document.getElementById('logoutMenuBtn');
      const walletBalanceEl = document.getElementById('header-wallet-balance');

      userMenuButton?.addEventListener('click', (event) => {
        event.stopPropagation();
        const isOpen = userMenu?.classList.toggle('open');
        userMenuButton.setAttribute('aria-expanded', String(isOpen));
        userMenu?.setAttribute('aria-hidden', String(!isOpen));
      });

      document.addEventListener('click', (event) => {
        if (!userMenuWrap?.contains(event.target)) {
          userMenu?.classList.remove('open');
          userMenuButton?.setAttribute('aria-expanded', 'false');
          userMenu?.setAttribute('aria-hidden', 'true');
        }
      });

      logoutMenuBtn?.addEventListener('click', async () => {
        if (window.logoutUser) {
          const result = await window.logoutUser();
          if (result?.ok) {
            window.tryRedirectToLogin('login-register/login.html');
          }
        }
      });

      try {
        const currentUser = window.getCurrentUser ? window.getCurrentUser() : (window.getCurrentUserAsync ? await window.getCurrentUserAsync() : null);
        if (currentUser) {
          if (userMenuWrap) userMenuWrap.hidden = false;
          const displayName = currentUser.full_name || currentUser.email || tkText('common.player', 'Joueur');
          const firstLetter = String(displayName).trim().charAt(0).toUpperCase();

          if (userAvatar) {
            userAvatar.innerHTML = '';
            const avatarUrl = currentUser.avatar_url || currentUser.picture || null;
            if (avatarUrl) {
              const img = document.createElement('img');
              img.src = avatarUrl;
              img.alt = displayName;
              userAvatar.appendChild(img);
            } else {
              userAvatar.textContent = firstLetter || 'U';
            }
          }

          if (window.getAuthenticatedWallet) {
            const wallet = await window.getAuthenticatedWallet();
            if (wallet && walletBalanceEl) {
              const balance = Number(wallet.balance || 0);
              const currency = wallet.currency || 'HTG';
              walletBalanceEl.textContent = `${balance.toLocaleString(window.TKI18n?.getLocale?.() || 'fr-FR')} ${currency}`;
            }
          }
        }
      } catch (err) {
        console.warn("Erreur d'initialisation du header premium:", err);
      }
    })();
  </script>
</body>
