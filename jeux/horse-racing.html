<!DOCTYPE html>
<html lang="ht">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Course Cheval - Tonton Kondo</title>
<style>
  :root {
    --bg-0: #0a0f14;
    --bg-1: #101820;
    --bg-2: #17222c;
    --stade: #0f5132;
    --or: #f5c518;
    --or-2: #ffdd57;
    --texte: #f5f7fa;
    --texte-mute: #9aa7b4;
    --border: rgba(255,255,255,0.08);
    --danger: #ef4444;
    --success: #22c55e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { overflow-x: hidden; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: radial-gradient(circle at top, #17222c 0%, #0a0f14 60%);
    color: var(--texte);
    min-height: 100vh;
    padding-bottom: 40px;
  }
  header {
    background: linear-gradient(180deg, #0b1116 0%, #0a0f14 100%);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 10;
    flex-wrap: wrap; gap: 12px;
  }
  .header-actions {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  }
  .brand {
    display: flex; align-items: center; gap: 12px; color: var(--texte); text-decoration: none;
  }
  .brand img {
    width: 56px; height: 56px; border-radius: 16px; object-fit: contain;
  }
  .brand-text strong {
    display: block; font-size: 18px; letter-spacing: .04em;
  }
  .brand-text span {
    display: block; color: var(--texte-mute); font-size: 12px; text-transform: uppercase; letter-spacing: .35em;
  }
  @media (max-width: 520px) {
    .brand img { width: 46px; height: 46px; }
    .brand-text strong { font-size: 16px; }
    .brand-text span { font-size: 10px; letter-spacing: .24em; }
  }
  .back-link {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 12px; border-radius: 999px; border: 1px solid var(--border);
    background: rgba(255,255,255,0.04); color: var(--texte); font-size: 13px; font-weight: 700;
    text-decoration: none;
  }
  .balance {
    display: flex; align-items: center; gap: 8px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    padding: 8px 14px; border-radius: 999px;
    font-weight: 700; color: var(--or-2); font-size: 14px;
  }
  main { max-width: 1100px; margin: 0 auto; padding: 20px 16px; }
  h1.title {
    text-align: center; font-size: clamp(22px, 4vw, 32px); margin-bottom: 6px;
    background: linear-gradient(90deg, var(--or), var(--or-2));
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  p.subtitle { text-align: center; color: var(--texte-mute); margin-bottom: 22px; font-size: 14px; }
  .horse-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 14px; margin-bottom: 24px;
  }
  .horse-card {
    position: relative;
    background: linear-gradient(160deg, var(--bg-2), var(--bg-1));
    border: 1px solid var(--border);
    border-radius: 18px; padding: 16px; cursor: pointer;
    transition: transform .18s ease, border-color .18s ease, box-shadow .18s ease;
    overflow: hidden;
  }
  .horse-card:hover { transform: translateY(-3px); border-color: rgba(245,197,24,0.4); }
  .horse-card.selected {
    border-color: var(--or);
    box-shadow: 0 0 0 2px rgba(245,197,24,0.35), 0 10px 30px rgba(0,0,0,.4);
  }
  .horse-card.winner {
    border-color: rgba(34,197,94,0.8);
    box-shadow: 0 0 0 2px rgba(34,197,94,0.35), 0 10px 30px rgba(0,0,0,.4);
  }
  .horse-card .selection-badge,
  .horse-card .winner-badge {
    display: none;
    position: absolute;
    top: 10px;
    left: 46px;
    background: rgba(0,0,0,0.6);
    color: var(--or-2);
    border: 1px solid rgba(255,255,255,0.12);
    font-size: 10px;
    font-weight: 800;
    padding: 4px 8px;
    border-radius: 999px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .horse-card.selected .selection-badge { display: inline-flex; }
  .horse-card.winner .winner-badge { display: inline-flex; color: var(--success); }
  .horse-num {
    position: absolute; top: 10px; left: 12px;
    width: 26px; height: 26px; border-radius: 8px;
    background: rgba(255,255,255,0.08);
    display: grid; place-items: center; font-size: 13px; font-weight: 800; color: var(--or-2);
  }
  .horse-odds {
    position: absolute; top: 10px; right: 12px;
    background: linear-gradient(135deg, var(--or), #d4a017);
    color: #1a1a1a; font-weight: 800; font-size: 12px;
    padding: 4px 8px; border-radius: 999px;
  }
  .horse-visual {
    height: 90px; border-radius: 12px;
    display: grid; place-items: center;
    margin: 16px 0 10px; position: relative; overflow: hidden;
  }
  .horse-visual::after {
    content: ""; position: absolute; inset: 0;
    background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.15), transparent 60%);
  }
  .horse-visual img {
    width: 100%; height: 100%; display: block; object-fit: contain;
    transform: translateY(0); border-radius: 8px;
  }
  .horse-name { text-align: center; font-weight: 800; font-size: 16px; }
  .horse-color-label { text-align: center; font-size: 11px; color: var(--texte-mute); margin-top: 2px; text-transform: uppercase; letter-spacing: 1px; }
  .bet-panel {
    background: linear-gradient(160deg, var(--bg-2), var(--bg-1));
    border: 1px solid var(--border);
    border-radius: 18px; padding: 18px;
    display: grid; gap: 14px; margin-bottom: 20px;
  }
  .summary-row { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; font-size: 14px; }
  .summary-row .k { color: var(--texte-mute); }
  .summary-row .v { font-weight: 700; color: var(--or-2); }
  .amount-wrap { display: flex; gap: 8px; align-items: center; }
  .amount-wrap label { font-size: 13px; color: var(--texte-mute); min-width: 90px; }
  input#bet-amount {
    flex: 1; min-width: 0;
    background: rgba(0,0,0,0.35);
    border: 1px solid var(--border); color: var(--texte);
    padding: 12px 14px; border-radius: 12px; font-size: 16px; font-weight: 700; outline: none;
  }
  input#bet-amount:focus { border-color: var(--or); }
  .actions { display: flex; gap: 10px; flex-wrap: wrap; }
  .btn {
    flex: 1; min-width: 130px; padding: 14px 18px; border-radius: 12px;
    border: none; cursor: pointer; font-size: 15px; font-weight: 800;
    letter-spacing: 0.5px; transition: transform .12s ease, opacity .12s ease;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary {
    background: linear-gradient(135deg, var(--or), #d4a017);
    color: #1a1a1a; box-shadow: 0 8px 24px rgba(245,197,24,0.35);
  }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; box-shadow: none; }
  .btn-secondary {
    background: rgba(255,255,255,0.06); color: var(--texte); border: 1px solid var(--border);
  }
  .feedback { text-align: center; font-size: 14px; min-height: 20px; color: var(--texte-mute); }
  .feedback.error { color: var(--danger); }
  .feedback.success { color: var(--success); }
  .track-wrap {
    background: linear-gradient(180deg, #0e3a24, #0a2a1a);
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 18px; padding: 16px; position: relative; overflow: hidden;
  }
  .track-wrap::before {
    content: ""; position: absolute; inset: 0;
    background: repeating-linear-gradient(90deg, rgba(255,255,255,0.03) 0 20px, transparent 20px 40px);
    pointer-events: none;
  }
  .track-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 12px; font-weight: 800; color: var(--or-2);
  }
  .leader-badge {
    margin-top: 8px; display: inline-flex; align-items: center; gap: 6px;
    background: rgba(0,0,0,0.28); border: 1px solid rgba(255,255,255,0.12);
    padding: 6px 10px; border-radius: 999px; font-size: 12px; color: var(--or-2);
  }
  .lane {
    position: relative; height: 44px;
    background: linear-gradient(180deg, #164a2e, #0f3a24);
    border-radius: 10px; margin-bottom: 8px; overflow: hidden;
  }
  .lane.winner {
    box-shadow: inset 0 0 0 1px rgba(34,197,94,0.45), 0 0 18px rgba(34,197,94,0.2);
  }
  .lane:last-child { margin-bottom: 0; }
  .lane-num {
    position: absolute; left: 8px; top: 50%; transform: translateY(-50%);
    width: 24px; height: 24px; border-radius: 6px;
    background: rgba(0,0,0,0.5); color: var(--or-2);
    display: grid; place-items: center; font-size: 12px; font-weight: 800; z-index: 2;
  }
  .finish-line {
    position: absolute; right: 6px; top: 0; bottom: 0; width: 8px;
    background: repeating-linear-gradient(0deg, #fff 0 6px, #000 6px 12px);
    opacity: 0.7;
  }
  .runner,
  .horse-runner {
    position: absolute;
    left: 38px;
    top: 50%;
    width: 70px;
    height: 44px;
    transform: translate(0px, -50%) scale(1);
    transition: none;
    will-change: transform;
    filter: drop-shadow(0 2px 3px rgba(0,0,0,0.5));
    z-index: 1;
  }
  .runner.is-leading,
  .horse-runner.is-leading {
    box-shadow: 0 8px 30px rgba(245,197,24,0.08);
    z-index: 3;
  }
  .runner__inner,
  .horse-runner__inner {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: horse-gallop 0.16s steps(2) infinite;
  }
  .runner__inner img,
  .runner__inner .runner__fallback {
    width: 100%;
    height: 100%;
    object-fit: contain;
    object-position: center;
    display: block;
  }
  .runner__shadow,
  .horse-runner__shadow {
    position: absolute; left: 6px; right: 6px; bottom: -4px;
    height: 8px; background: rgba(0,0,0,0.28); border-radius: 999px; filter: blur(4px);
  }
  .runner__label,
  .horse-runner__label {
    position: absolute; left: 50%; top: -24px; transform: translateX(-50%);
    background: rgba(7,12,18,0.85); color: var(--or-2); border: 1px solid rgba(255,255,255,0.12);
    padding: 3px 8px; border-radius: 999px; font-size: 10px; font-weight: 800; white-space: nowrap;
    letter-spacing: 0.04em;
  }
  .runner__fallback,
  .horse-runner__fallback {
    border-radius: 999px; background: currentColor; box-shadow: inset 0 0 0 2px rgba(255,255,255,0.2);
    transform: rotate(-8deg);
  }
  .runner__fallback::before,
  .runner__fallback::after {
    content: ""; position: absolute; background: inherit; border-radius: 999px;
  }
  .runner__fallback::before {
    width: 18px; height: 8px; left: -8px; top: 14px; transform: rotate(-20deg);
  }
  .runner__fallback::after {
    width: 16px; height: 7px; right: -8px; top: 12px; transform: rotate(18deg);
  }
  /* Track and visual enhancements */
  .start-line {
    position: absolute; left: 34px; top: 0; bottom: 0; width: 4px;
    background: repeating-linear-gradient(0deg, rgba(255,255,255,0.06) 0 6px, transparent 6px 12px);
    opacity: 0.6; z-index: 2;
  }
  .lane::before {
    content: ""; position: absolute; left: 0; right: 0; top: 0; bottom: 0;
    background-image: linear-gradient(90deg, rgba(255,255,255,0.01) 0 2px, transparent 2px 6px);
    pointer-events: none; z-index: 0;
  }
  .runner .dust,
  .horse-runner .dust {
    position: absolute; left: -10px; bottom: 2px; width: 30px; height: 12px; border-radius: 50%;
    background: radial-gradient(ellipse at center, rgba(200,160,120,0.28) 0%, rgba(120,80,40,0.12) 60%, transparent 100%);
    opacity: 0; transform-origin: left center; filter: blur(2px);
    transition: opacity .12s linear, transform .12s linear;
    z-index: 0;
  }
  .runner.speedy .dust,
  .horse-runner.speedy .dust { opacity: 0.9; transform: scale(1.05) translateX(-6px); }
  .runner.is-leading, .horse-runner.is-leading { box-shadow: 0 8px 30px rgba(245,197,24,0.08); z-index: 3; }
  #race-timer { font-weight: 900; color: var(--or-2); background: rgba(0,0,0,0.22); padding: 6px 8px; border-radius: 8px; font-size: 13px; }
  /* prepared sprite class for future */
  .horse-runner.sprite .runner__inner { animation: none; }
  @keyframes dust-kick { 0% { opacity: 0; transform: scale(.8) translateX(0); } 50% { opacity: .8; transform: scale(1.05) translateX(-6px); } 100% { opacity: 0; transform: scale(1.2) translateX(-12px); } }
  @keyframes horse-gallop {
    0% { transform: translateY(0px) rotate(-3deg) scale(1); }
    50% { transform: translateY(-2px) rotate(2deg) scale(1.02); }
    100% { transform: translateY(0px) rotate(-3deg) scale(1); }
  }
  .race-result {
    margin-top: 16px; background: rgba(0,0,0,0.35);
    border: 1px solid var(--border); border-radius: 14px;
    padding: 16px; text-align: center; display: none;
  }
  .race-result.show { display: block; animation: pop .35s ease; }
  .race-result h3 { color: var(--or-2); margin-bottom: 6px; }
  .race-result .gain { color: var(--success); font-size: 20px; font-weight: 800; margin-top: 6px; }
  .race-result .loss { color: var(--danger); font-size: 15px; margin-top: 6px; }
  @keyframes pop { 0% { transform: scale(0.9); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
  @media (max-width: 480px) {
    .horse-grid { grid-template-columns: repeat(2, 1fr); }
    .horse-visual { font-size: 42px; height: 78px; }
    .btn { min-width: 100%; }
  }
</style>

<script>
  const HORSES = [
    { id: "zekle", number: 1, name: "Zeklè", color: "noir", colorLabel: "Noir", colorHex: "#1a1a1a", image: "../assets/horses/horse-black-run.jpeg", odds: 5.0 },
    { id: "lakay", number: 2, name: "Lakay", color: "blanc", colorLabel: "Blanc", colorHex: "#e5e7eb", image: "../assets/horses/horse-white-run.jpeg", odds: 4.2 },
    { id: "bel_gason", number: 3, name: "Bèl Gason", color: "marron", colorLabel: "Marron", colorHex: "#6b3f1d", image: "../assets/horses/horse-brown-run.jpeg", odds: 6.5 },
    { id: "mapou", number: 4, name: "Mapou", color: "roux/orangé", colorLabel: "Roux/Orangé", colorHex: "#c2410c", image: "../assets/horses/horse-roux-run.jpeg", odds: 7.5 },
    { id: "towo", number: 5, name: "Towo", color: "gris", colorLabel: "Gris", colorHex: "#6b7280", image: "../assets/horses/horse-gray-run.jpeg", odds: 3.8 },
  ];

  /* Race engine: event-driven position/speed model for natural overtakes and winner sprint */
  function clamp(value, min, max) {
    return Math.max(min, Math.min(max, value));
  }

  function smoothStep(value) {
    return value * value * (3 - 2 * value);
  }

  function randomInRange(min, max) {
    return min + Math.random() * (max - min);
  }

  function shuffleArray(array) {
    const result = [...array];
    for (let i = result.length - 1; i > 0; i -= 1) {
      const j = Math.floor(Math.random() * (i + 1));
      [result[i], result[j]] = [result[j], result[i]];
    }
    return result;
  }

  function createRaceTimeline(horses, winnerId, duration) {
    const keyTimes = [0, 0.15, 0.30, 0.50, 0.70, 0.88, 1];
    const winnerRanges = {
      0.15: [0.08, 0.16],
      0.30: [0.22, 0.36],
      0.50: [0.42, 0.58],
      0.70: [0.62, 0.76],
      0.88: [0.82, 0.92],
    };
    const loserRanges = {
      0.15: [0.06, 0.14],
      0.30: [0.16, 0.30],
      0.50: [0.32, 0.50],
      0.70: [0.50, 0.70],
      0.88: [0.66, 0.86],
    };

    const winnerPoints = keyTimes.map((time) => {
      if (time === 0) return 0;
      if (time === 1) return 1;
      const [minValue, maxValue] = winnerRanges[time];
      return randomInRange(minValue, maxValue);
    });

    for (let i = 1; i < winnerPoints.length - 1; i += 1) {
      winnerPoints[i] = Math.max(winnerPoints[i], winnerPoints[i - 1] + 0.02);
    }

    const loserIds = horses.filter((horse) => horse.id !== winnerId).map((horse) => horse.id);
    const leadCount = Math.min(3, Math.max(2, loserIds.length));
    const leadStages = [0.30, 0.50, 0.70].slice(0, leadCount);
    const leaders = shuffleArray(loserIds).slice(0, leadCount);
    const leaderMap = leaders.reduce((map, id, index) => {
      map[id] = leadStages[index];
      return map;
    }, {});

    const timelines = horses.map((horse) => {
      const isWinner = horse.id === winnerId;
      const finalPosition = isWinner
        ? 1
        : clamp(randomInRange(0.78, 0.94), 0, 0.94);
      let lastPosition = 0;
      const points = keyTimes.map((time) => {
        let position = 0;

        if (time === 0) {
          position = 0;
        } else if (time === 1) {
          position = finalPosition;
        } else if (isWinner) {
          position = winnerPoints[keyTimes.indexOf(time)];
        } else {
          const [minValue, maxValue] = loserRanges[time];
          const upper = Math.min(maxValue, finalPosition - 0.02);
          if (leaderMap[horse.id] === time) {
            const winnerAtTime = winnerPoints[keyTimes.indexOf(time)];
            position = clamp(
              winnerAtTime + randomInRange(0.03, 0.06),
              lastPosition + 0.01,
              upper
            );
          } else {
            position = clamp(randomInRange(minValue, upper), lastPosition + 0.01, upper);
          }
        }

        position = clamp(position, lastPosition + 0.01, isWinner ? 1 : finalPosition - 0.01);
        lastPosition = position;
        return { t: time, pos: position };
      });

      points[points.length - 1].pos = finalPosition;
      for (let i = 1; i < points.length; i += 1) {
        points[i].pos = Math.max(points[i].pos, points[i - 1].pos + 0.01);
      }

      return { horseId: horse.id, points };
    });

    return { duration, winnerId, timelines };
  }

  function interpolatePosition(points, currentT) {
    if (!points || points.length === 0) return 0;
    if (currentT <= points[0].t) return points[0].pos;
    if (currentT >= points[points.length - 1].t) return points[points.length - 1].pos;

    let start = points[0];
    let end = points[points.length - 1];
    for (let i = 0; i < points.length - 1; i += 1) {
      if (currentT >= points[i].t && currentT <= points[i + 1].t) {
        start = points[i];
        end = points[i + 1];
        break;
      }
    }

    const localT = (currentT - start.t) / Math.max(0.0001, end.t - start.t);
    const eased = smoothStep(clamp(localT, 0, 1));
    return start.pos + (end.pos - start.pos) * eased;
  }

  const horseRaceState = {
    selectedHorse: null,
    amount: 0,
    isPlaying: false,
    lastResult: null,
  };

  const $horseList     = document.getElementById("horse-list");
  const $selectedHorse = document.getElementById("selected-horse");
  const $betAmount     = document.getElementById("bet-amount");
  const $startBtn      = document.getElementById("start-race-btn");
  const $clearBtn      = document.getElementById("clear-race-btn");
  const $track         = document.getElementById("race-track");
  const $result        = document.getElementById("race-result");
  const $balance       = document.getElementById("user-balance");
  const $feedback      = document.getElementById("feedback-message");
  const $potential     = document.getElementById("potential-gain");
  const $selectedOdds   = document.getElementById("selected-odds");
  const $status        = document.getElementById("race-status");
  const $statusInline   = document.getElementById("race-status-inline");

  function initHorseRace() {
    renderHorseCards();
    renderTrack();
    $betAmount.addEventListener("input", () => {
      horseRaceState.amount = Number($betAmount.value) || 0;
      updateHorseSummary();
    });
    $clearBtn.addEventListener("click", clearHorseSelection);
    $startBtn.addEventListener("click", playHorseRace);
    updateHorseSummary();
  }

  function shade(hex, percent) {
    const num = parseInt(hex.replace("#",""), 16);
    const r = Math.max(0, Math.min(255, (num >> 16) + percent));
    const g = Math.max(0, Math.min(255, ((num >> 8) & 0xff) + percent));
    const b = Math.max(0, Math.min(255, (num & 0xff) + percent));
    return "#" + ((r << 16) | (g << 8) | b).toString(16).padStart(6, "0");
  }

  function renderHorseRunner(horse) {
    const fallbackStyle = `color:${horse.colorHex};`;
    return `
      <div class="runner__inner" style="${fallbackStyle}">
        <div class="runner__shadow"></div>
        <div class="runner__label">${horse.name}</div>
        ${horse.image
          ? `<img src="${horse.image}" alt="${horse.name}" onerror="this.style.display='none'; this.parentElement.querySelector('.runner__fallback').style.display='block';" />`
          : ''}
        <div class="runner__fallback" style="display:${horse.image ? 'none' : 'block'};${fallbackStyle}"></div>
      </div>
    `;
  }

  function renderHorseCards() {
    $horseList.innerHTML = "";
    HORSES.forEach((h) => {
      const card = document.createElement("div");
      card.className = "horse-card";
      card.dataset.horseId = h.id;
      card.innerHTML = `
        <div class="horse-num">#${h.number}</div>
        <div class="horse-odds">x${h.odds.toFixed(1)}</div>
        <div class="selection-badge">Choisi</div>
        <div class="winner-badge">Gagnant</div>
        <div class="horse-visual" style="background: linear-gradient(160deg, ${h.colorHex}, ${shade(h.colorHex, -25)});">
          ${h.image ? `<img src="${h.image}" alt="${h.name}" onerror="this.style.display='none'; this.parentElement.querySelector('.horse-visual-fallback').style.display='flex';"/>` : ''}
          <div class="horse-visual-fallback" style="display:${h.image ? 'none' : 'flex'};width:100%;height:100%;align-items:center;justify-content:center;background:${h.colorHex};border-radius:8px;"></div>
        </div>
        <div class="horse-name">${h.name}</div>
        <div class="horse-color-label">${h.colorLabel}</div>
      `;
      card.addEventListener("click", () => selectHorse(h.id));
      $horseList.appendChild(card);
    });
    updateHorseCardState();
  }

  function selectHorse(horseId) {
    if (horseRaceState.isPlaying) return;
    const horse = HORSES.find((h) => h.id === horseId);
    if (!horse) return;
    horseRaceState.selectedHorse = horse;
    updateHorseCardState();
    updateHorseSummary();
  }

  function updateHorseCardState() {
    document.querySelectorAll(".horse-card").forEach((card) => {
      const horseId = card.dataset.horseId;
      const isSelected = horseRaceState.selectedHorse && horseRaceState.selectedHorse.id === horseId;
      const isWinner = horseRaceState.lastResult && horseRaceState.lastResult.winner_id === horseId;
      card.classList.toggle("selected", isSelected);
      card.classList.toggle("winner", isWinner);
    });
  }

  function clearHorseSelection() {
    if (horseRaceState.isPlaying) return;
    horseRaceState.selectedHorse = null;
    horseRaceState.amount = 0;
    $betAmount.value = "";
    updateHorseCardState();
    $result.classList.remove("show");
    $result.innerHTML = "";
    setFeedback("", "");
    updateHorseSummary();
  }

  function updateHorseSummary() {
    const hasSelection = Boolean(horseRaceState.selectedHorse);
    const amountValid = Number(horseRaceState.amount) > 0;
    $selectedHorse.textContent = horseRaceState.selectedHorse
      ? `${horseRaceState.selectedHorse.name}`
      : "Okenn";
    $selectedOdds.textContent = horseRaceState.selectedHorse
      ? `x${horseRaceState.selectedHorse.odds.toFixed(1)}`
      : "—";
    const potential = hasSelection && amountValid
      ? Math.floor(horseRaceState.amount * horseRaceState.selectedHorse.odds)
      : 0;
    $potential.textContent = potential + " HTG";
    $startBtn.disabled = horseRaceState.isPlaying || !hasSelection || !amountValid;
  }

  function renderTrack() {
    $track.innerHTML = "";
    HORSES.forEach((h) => {
      const lane = document.createElement("div");
      lane.className = "lane";
      lane.innerHTML = `
        <div class="lane-num">#${h.number}</div>
        <div class="start-line" aria-hidden="true"></div>
        <div class="finish-line"></div>
        <div class="runner horse-runner" data-horse="${h.id}">
          ${renderHorseRunner(h)}
          <div class="dust" aria-hidden="true"></div>
        </div>
      `;
      $track.appendChild(lane);
    });
  }

  function resetRunners() {
    document.querySelectorAll(".runner").forEach((r) => {
      r.style.transition = "none";
      r.style.transform = "translate(0px, -50%) scale(1)";
      r.classList.remove("is-leading", "speedy");
    });
    document.querySelectorAll(".lane").forEach((lane) => lane.classList.remove("winner"));
    horseRaceState.lastResult = null;
    updateHorseCardState();
    void $track.offsetWidth;
  }

  function animateHorseRace(result) {
    const duration = 6500 + Math.random() * 3000;
    const race = createRaceTimeline(HORSES, result.winner_id, duration);
    const trackRect = $track.getBoundingClientRect();
    const maxLeft = Math.max(120, trackRect.width - 70);
    const runners = {};
    document.querySelectorAll(".runner").forEach((runner) => {
      runners[runner.dataset.horse] = runner;
    });
    const prevPosition = {};
    const startTime = performance.now();

    return new Promise((resolve) => {
      const tick = (now) => {
        const elapsed = now - startTime;
        const currentT = clamp(elapsed / duration, 0, 1);
        let leaderId = null;
        let leaderPosition = -1;

        race.timelines.forEach(({ horseId, points }) => {
          const runner = runners[horseId];
          if (!runner) return;
          const position = interpolatePosition(points, currentT);
          const xOffset = Math.round(position * (maxLeft - 38));
          const prev = prevPosition[horseId] || 0;
          const delta = position - prev;

          if (position > leaderPosition) {
            leaderPosition = position;
            leaderId = horseId;
          }

          runner.classList.toggle("is-leading", horseId === leaderId);
          runner.classList.toggle("speedy", delta > 0.008);
          runner.style.transform = `translate(${xOffset}px, -50%) scale(${horseId === leaderId ? 1.04 : 1})`;
          prevPosition[horseId] = position;
        });

        const leaderBadge = document.getElementById("leader-badge");
        if (leaderBadge) {
          leaderBadge.textContent = `En tête : ${HORSES.find((h) => h.id === leaderId)?.name || "—"}`;
        }

        const $timer = document.getElementById("race-timer");
        if ($timer) {
          const remainingMs = Math.max(0, duration - elapsed);
          if (remainingMs > 0) {
            const remaining = Math.ceil(remainingMs / 1000);
            const mm = Math.floor(remaining / 60).toString().padStart(2, "0");
            const ss = (remaining % 60).toString().padStart(2, "0");
            $timer.textContent = `${mm}:${ss}`;
          } else {
            $timer.textContent = "Kous la ap fèt...";
          }
        }

        if (currentT < 1) {
          requestAnimationFrame(tick);
          return;
        }

        race.timelines.forEach(({ horseId, points }) => {
          const runner = runners[horseId];
          if (!runner) return;
          const lane = runner.closest(".lane");
          const isWinner = horseId === result.winner_id;
          if (lane) lane.classList.toggle("winner", isWinner);
          runner.classList.toggle("is-leading", isWinner);
          const finalPosition = interpolatePosition(points, 1);
          const xOffset = Math.round(finalPosition * (maxLeft - 38));
          runner.style.transform = `translate(${xOffset}px, -50%) scale(${isWinner ? 1.04 : 1})`;
        });

        updateHorseCardState();
        resolve();
      };

      requestAnimationFrame(tick);
    });
  }

  function showHorseRaceResult(result) {
    const selected = horseRaceState.selectedHorse;
    const selectedHorseName = result.selected_horse_name || selected?.name || HORSES.find((h) => h.id === result.horse_id)?.name || '—';
    const winnerHorseName = result.winner_horse_name || HORSES.find((h) => h.id === result.winner_id)?.name || '—';
    const ticketNumber = result.ticket_number || result.ticket || result.ticketNumber || '—';
    const betAmount = Number(result.amount ?? horseRaceState.amount ?? 0);
    const multiplier = Number(result.payout_multiplier ?? result.odds ?? 0);
    const gainAmount = Number(result.gain ?? 0);
    const status = String(result.status || '—').trim();

    $result.innerHTML = `
      <h3>Résultat de la course</h3>
      <div><strong>Ticket :</strong> ${ticketNumber}</div>
      <div><strong>Cheval choisi :</strong> ${selectedHorseName}</div>
      <div><strong>Cheval gagnant :</strong> ${winnerHorseName}</div>
      <div><strong>Cote :</strong> x${multiplier.toFixed(1)}</div>
      <div><strong>Mise :</strong> ${betAmount.toLocaleString('fr-FR')} HTG</div>
      <div><strong>Gain :</strong> ${gainAmount.toLocaleString('fr-FR')} HTG</div>
      <div><strong>Statut :</strong> ${status}</div>
    `;
    $result.classList.add('show');
    horseRaceState.lastResult = result;
    updateHorseCardState();
  }

  async function waitForSupabaseClient(maxAttempts = 12, delayMs = 250) {
    // Try to get client through the exposed function first
    if (typeof window.getSupabaseClient === 'function') {
      try {
        const client = await window.getSupabaseClient();
        if (client && typeof client.from === 'function') {
          return client;
        }
      } catch (error) {
        console.warn('Error calling getSupabaseClient:', error);
      }
    }

    // Fallback: wait for window.supabaseClient
    for (let attempt = 0; attempt < maxAttempts; attempt += 1) {
      const client = window.supabaseClient || null;
      if (client && typeof client.from === 'function') {
        return client;
      }
      await new Promise((resolve) => setTimeout(resolve, delayMs));
    }
    return window.supabaseClient || null;
  }

  async function getCurrentHorseRaceUser() {
    if (horseRaceState.currentUser) {
      return horseRaceState.currentUser;
    }
    if (typeof window.getCurrentUserAsync === 'function') {
      const currentUser = await window.getCurrentUserAsync();
      horseRaceState.currentUser = currentUser;
      return currentUser;
    }
    if (typeof window.getCurrentUser === 'function') {
      const currentUser = await window.getCurrentUser();
      horseRaceState.currentUser = currentUser;
      return currentUser;
    }
    return null;
  }

  async function refreshHorseRaceBalance({ silent = false } = {}) {
    const currentUser = await getCurrentHorseRaceUser();
    if (!currentUser?.id) {
      if (!silent) {
        $balance.textContent = 'Connectez-vous pour jouer.';
      }
      return null;
    }

    const client = await waitForSupabaseClient();
    if (!client || typeof client.from !== 'function') {
      if (!silent) {
        $balance.textContent = 'Solde indisponible';
      }
      return null;
    }

    try {
      const { data, error } = await client.from('wallets').select('balance,currency,status').eq('user_id', currentUser.id).maybeSingle();
      if (error || !data) {
        if (!silent) {
          $balance.textContent = 'Solde introuvable';
        }
        return null;
      }
      const balanceValue = Number(data.balance ?? 0);
      horseRaceState.wallet = data;
      $balance.textContent = `${balanceValue.toLocaleString('fr-FR')} HTG`;
      return data;
    } catch (error) {
      if (!silent) {
        $balance.textContent = 'Solde indisponible';
      }
      return null;
    }
  }

  function setFeedback(msg, type) {
    $feedback.textContent = msg;
    $feedback.className = 'feedback' + (type ? ' ' + type : '');
  }

  function setRaceStatus(message) {
    $status.textContent = message;
    $statusInline.textContent = message;
  }

  function buildHorseRacePayload() {
    return {
      horse_id: horseRaceState.selectedHorse ? horseRaceState.selectedHorse.id : null,
      amount: horseRaceState.amount,
    };
  }

  async function playHorseRace() {
    if (horseRaceState.isPlaying) return;
    if (!horseRaceState.selectedHorse) {
      setFeedback('Choisissez un cheval avant de jouer.', 'error');
      return;
    }
    if (!horseRaceState.amount || horseRaceState.amount <= 0) {
      setFeedback('Entrez un montant de mise valide.', 'error');
      return;
    }

    const currentUser = await getCurrentHorseRaceUser();
    if (!currentUser?.id) {
      setFeedback('Vous devez être connecté pour jouer.', 'error');
      return;
    }

    const client = await waitForSupabaseClient();
    if (!client || typeof client.rpc !== 'function') {
      setFeedback('Le client Supabase n’est pas disponible.', 'error');
      return;
    }

    const payload = buildHorseRacePayload();
    horseRaceState.isPlaying = true;
    $startBtn.disabled = true;
    $clearBtn.disabled = true;
    setRaceStatus('Kous la kòmanse...');
    setFeedback('Envoi de la mise au backend...', 'warn');
    resetRunners();
    $result.classList.remove('show');
    horseRaceState.lastResult = null;
    updateHorseCardState();

    try {
      const { data, error } = await client.rpc('play_horse_race', {
        p_user_id: currentUser.id,
        p_horse_id: payload.horse_id,
        p_amount: payload.amount,
      });

      if (error) {
        console.error('RPC Error:', error);
        throw error;
      }
      
      console.log('RPC Response:', data);
      
      if (!data) {
        throw new Error('Aucune donnée retournée par la course. Vérifiez la fonction RPC play_horse_race.');
      }
      
      // Handle array response from RPC (Supabase returns array by default)
      let result = Array.isArray(data) ? data[0] : data;
      
      if (!result) {
        throw new Error('Le tableau de résultats est vide.');
      }
      
      // Map RPC response fields to expected format
      result = {
        ticket_id: result.ticket_id,
        ticket_number: result.ticket_number,
        ticket: result.ticket_number,
        round_id: result.round_id,
        horse_id: result.selected_horse_id,
        selected_horse_id: result.selected_horse_id,
        selected_horse_name: result.selected_horse_name,
        winner_id: result.winner_horse_id,  // RPC returns winner_horse_id, we need winner_id
        winner_horse_id: result.winner_horse_id,
        winner_horse_name: result.winner_horse_name,
        amount: result.bet_amount,           // RPC returns bet_amount, we need amount
        gain: result.win_amount,             // RPC returns win_amount, we need gain
        status: result.status,
        payout_multiplier: result.payout_multiplier,
        odds: horseRaceState.selectedHorse?.odds || 0,
      };
      
      if (!result.winner_id) {
        console.error('Invalid result data:', result);
        throw new Error('Résultat de course invalide: winner_id manquant. Réponse: ' + JSON.stringify(result));
      }

      await animateHorseRace(result);
      showHorseRaceResult(result);
      await refreshHorseRaceBalance({ silent: true });
      setFeedback('Kous terminée.', 'success');
      setRaceStatus('Fini');
    } catch (error) {
      console.error('Play Horse Race Error:', error);
      setFeedback(error?.message || 'Erreur pendant la course. Réessayez.', 'error');
      setRaceStatus('Erreur');
    } finally {
      horseRaceState.isPlaying = false;
      $startBtn.disabled = false;
      $clearBtn.disabled = false;
      updateHorseSummary();
    }
  }

  async function initializeHorseRaceAuth() {
    setFeedback('Vérification de la connexion en cours...', 'warn');
    setRaceStatus('Chargement');
    $balance.textContent = 'Chargement du solde...';

    const client = await waitForSupabaseClient();
    if (!client) {
      setFeedback('La connexion Supabase est indisponible. Rechargez la page.', 'error');
      $balance.textContent = 'Solde indisponible';
      setRaceStatus('Erreur');
      return;
    }

    if (typeof window.getCurrentUserAsync !== 'function') {
      setFeedback('Le système d’authentification est indisponible.', 'error');
      $balance.textContent = 'Solde indisponible';
      setRaceStatus('Erreur');
      return;
    }

    const currentUser = await getCurrentHorseRaceUser();
    if (!currentUser?.id) {
      setFeedback('Vous devez être connecté pour jouer.', 'error');
      $balance.textContent = 'Connectez-vous pour jouer.';
      setRaceStatus('Hors ligne');
      return;
    }

    await refreshHorseRaceBalance({ silent: false });
    setFeedback('Prêt à courir !', 'success');
    setRaceStatus('Prêt');
  }

  initHorseRace();
  initializeHorseRaceAuth();
</script>
</body>
</html>
